name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run package

      - name: Zip release
        run: cd release && zip -r ../OrgBoard-${{ github.ref_name }}.zip OrgBoard/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: OrgBoard-${{ github.ref_name }}.zip
          generate_release_notes: true
