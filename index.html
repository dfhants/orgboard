<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Team Card Demo</title>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23d56f3e'/%3E%3Crect x='14' y='14' width='14' height='14' fill='%23fffaf1'/%3E%3Crect x='36' y='14' width='14' height='14' fill='%23fffaf1'/%3E%3Crect x='25' y='36' width='14' height='14' fill='%23fffaf1'/%3E%3C/svg%3E"
    />
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="page-header">
        <div>
          <p class="eyebrow">Demo UI</p>
          <h1>Nested team card organizer</h1>
          <p class="subtitle">
            Drag employees into manager or member slots. Drag team handles into other
            teams to nest them.
          </p>
        </div>
        <div class="header-actions">
          <button id="reset-demo" class="ghost-button" type="button">Reset demo</button>
        </div>
      </header>

      <section class="board-controls">
        <span>Top-level team state</span>
        <div id="root-layout-controls" class="segmented"></div>
      </section>

      <main id="app" class="app-grid"></main>
    </div>

    <script type="module" src="./src/app.js"></script>
  </body>
</html>
