<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TeamBoard — Team Organizer</title>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%233b6cf5'/%3E%3Crect x='14' y='14' width='14' height='14' fill='%23ffffff'/%3E%3Crect x='36' y='14' width='14' height='14' fill='%23ffffff'/%3E%3Crect x='25' y='36' width='14' height='14' fill='%23ffffff'/%3E%3C/svg%3E"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./src/styles.css" />
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.11.0/sql-wasm.js"></script>
  </head>
  <body>
    <header class="app-toolbar">
      <div class="toolbar-brand">
        <svg class="toolbar-logo" viewBox="0 0 64 64" width="28" height="28"><rect width="64" height="64" rx="14" fill="var(--accent)"/><rect x="14" y="14" width="14" height="14" fill="#fff"/><rect x="36" y="14" width="14" height="14" fill="#fff"/><rect x="25" y="36" width="14" height="14" fill="#fff"/></svg>
        <span class="toolbar-title">TeamBoard</span>
      </div>
      <div id="scenario-tabs" class="scenario-tabs"></div>
      <nav class="toolbar-actions">
        <button class="toolbar-button" type="button" id="import-csv-btn" title="Import CSV" aria-label="Import CSV"><i data-lucide="upload"></i><span>Import</span></button>
        <button class="toolbar-button" type="button" id="export-db-btn" title="Export database" aria-label="Export database"><i data-lucide="download"></i><span>Export</span></button>
      </nav>
    </header>

    <div class="page-shell">
      <main id="app" class="app-grid"></main>
    </div>

    <script type="module" src="./src/app.js"></script>
  </body>
</html>
