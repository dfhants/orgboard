<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OrgBoard — Team Organizer</title>
    <link rel="icon" type="image/png" sizes="32x32" href="./assets/icons/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="./assets/icons/favicon-16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="./assets/icons/apple-touch-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./src/css/main.css" />
  </head>
  <body>
    <header class="app-toolbar">
      <div class="toolbar-brand">
        <img class="toolbar-logo" src="./assets/icons/icon-192.png" width="28" height="28" alt="OrgBoard logo" />
        <span class="toolbar-title">OrgBoard</span>
      </div>
      <div id="scenario-tabs" class="scenario-tabs"></div>
      <nav class="toolbar-actions">
        <button class="toolbar-button" type="button" id="import-csv-btn" title="Import CSV" aria-label="Import CSV"><i data-lucide="upload"></i><span>Import</span></button>
        <button class="toolbar-button" type="button" id="export-db-btn" title="Export database" aria-label="Export database"><i data-lucide="download"></i><span>Export</span></button>
      </nav>
    </header>

    <div class="page-shell">
      <main id="app" class="app-grid"></main>
    </div>

    <script type="module" src="./src/app.js"></script>
  </body>
</html>
